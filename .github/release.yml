changelog:
  exclude:
    labels:
      - skip-changelog
      - invalid
      - question
      - wontfix
  categories:
    - title: Breaking Changes
      labels:
        - breaking-change
        - semver-major
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Bug Fixes
      labels:
        - bug
        - fix
    - title: Performance
      labels:
        - performance
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: Dependencies
      labels:
        - dependencies
        - deps
    - title: Maintenance
      labels:
        - chore
        - refactor
        - ci
        - test
    - title: Other Changes
      labels:
        - "*"
