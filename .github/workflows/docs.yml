# ────────────────────────────────────────────────────────────────────────────
# OpenViper — Docs deployment to GitHub Pages
# ────────────────────────────────────────────────────────────────────────────
name: Docs

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:   # allow manual trigger from the Actions tab

permissions:
  contents: read
  pages: write          # needed to deploy to GitHub Pages
  id-token: write       # needed for OIDC token used by deploy-pages

# Only allow one concurrent deployment; cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Sphinx Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Sphinx dependencies
        run: pip install sphinx sphinx_rtd_theme

      - name: Build HTML docs
        run: sphinx-build -b html docs/0.0.1 docs/0.0.1/_build/html -q

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/0.0.1/_build/html   # ← only the built HTML, nothing else

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
