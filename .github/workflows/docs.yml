# ────────────────────────────────────────────────────────────────────────────
# OpenViper — Docs deployment to GitHub Pages
# ────────────────────────────────────────────────────────────────────────────
name: Docs

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:   # allow manual trigger from the Actions tab

permissions:
  contents: write      # needed to push to gh-pages branch

jobs:
  deploy-docs:
    name: Build & Deploy Sphinx Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Sphinx dependencies
        run: pip install sphinx sphinx_rtd_theme

      - name: Build HTML docs
        run: sphinx-build -b html docs/0.0.1 docs/0.0.1/_build/html -q

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/0.0.1/_build/html
          publish_branch: gh-pages
          force_orphan: true          # keep gh-pages history clean
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "docs: deploy ${{ github.sha }}"
