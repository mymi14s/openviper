name: Openviper Tool

on:
  issue_comment:
    types: [created]

jobs:
  openviper-tool:
    if: |
      github.event.issue.pull_request &&
      (contains(github.event.comment.body, 'openviper-tool test this please') ||
       contains(github.event.comment.body, 'openviper-tool build') ||
       contains(github.event.comment.body, 'openviper-tool deploy'))
    name: Openviper Tool Action
    runs-on: ubuntu-latest
    steps:
      - name: Acknowledge comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Openviper Tool acknowledged. processing command...'
            })

      - uses: actions/checkout@v4

      - name: Determine Command
        id: cmd
        run: |
          if [[ "${{ github.event.comment.body }}" == *"test this please"* ]]; then
            echo "action=test" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.comment.body }}" == *"build"* ]]; then
            echo "action=build" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.comment.body }}" == *"deploy"* ]]; then
            echo "action=deploy" >> $GITHUB_OUTPUT
          fi

      # ── Test Action ────────────────────────────────────────────────────────
      - name: Trigger Test Workflow
        if: steps.cmd.outputs.action == 'test' || steps.cmd.outputs.action == 'deploy'
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: test.yml

      # ── Build Action ────────────────────────────────────────────────────────
      - name: Set up Python
        if: steps.cmd.outputs.action == 'build' || steps.cmd.outputs.action == 'deploy'
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up Node.js
        if: steps.cmd.outputs.action == 'build' || steps.cmd.outputs.action == 'deploy'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Admin Frontend
        if: steps.cmd.outputs.action == 'build' || steps.cmd.outputs.action == 'deploy'
        working-directory: admin_frontend
        run: |
          npm install
          npm run build

      - name: Build Wheel
        if: steps.cmd.outputs.action == 'build' || steps.cmd.outputs.action == 'deploy'
        run: |
          pip install build
          python -m build

      - name: Upload Artifact
        if: steps.cmd.outputs.action == 'build' || steps.cmd.outputs.action == 'deploy'
        uses: actions/upload-artifact@v4
        with:
          name: openviper-build-${{ github.event.issue.number }}
          path: dist/*.whl

      # ── Deploy Action ───────────────────────────────────────────────────────
      - name: Deploy to PyPI
        if: steps.cmd.outputs.action == 'deploy'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install twine
          twine upload dist/* --skip-existing
