name: Openviper Tool

on:
  issue_comment:
    types: [created]

permissions:
  actions: write
  contents: read
  pull-requests: write
  issues: write

jobs:
  openviper-tool:
    if: >
      github.event.issue.pull_request &&
      github.event.comment.user.type != 'Bot' &&
      (contains(github.event.comment.body, 'openviper-tool')) &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')

    name: Openviper Tool Action
    runs-on: ubuntu-latest

    steps:
      - name: Acknowledge command
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🚀 Openviper Tool acknowledged. Processing command..."
            })

      # ─────────────────────────────────────────────────────────────
      # Get PR branch info
      # ─────────────────────────────────────────────────────────────
      - name: Get PR data
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            })
            core.setOutput("ref", pr.data.head.ref)
            core.setOutput("repo", pr.data.head.repo.full_name)

      # ─────────────────────────────────────────────────────────────
      # Checkout the PR branch
      # ─────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          repository: ${{ steps.pr.outputs.repo }}
          ref: ${{ steps.pr.outputs.ref }}

      # ─────────────────────────────────────────────────────────────
      # Determine command — use env var to avoid shell injection
      # ─────────────────────────────────────────────────────────────
      - name: Determine Command
        id: cmd
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          if echo "$COMMENT_BODY" | grep -q "deploy"; then
            echo "action=deploy" >> $GITHUB_OUTPUT
          elif echo "$COMMENT_BODY" | grep -q "quality"; then
            echo "action=quality" >> $GITHUB_OUTPUT
          elif echo "$COMMENT_BODY" | grep -q "build"; then
            echo "action=build" >> $GITHUB_OUTPUT
          elif echo "$COMMENT_BODY" | grep -q "publish docs\|docs"; then
            echo "action=publish-docs" >> $GITHUB_OUTPUT
          elif echo "$COMMENT_BODY" | grep -q "test"; then
            echo "action=test" >> $GITHUB_OUTPUT
          else
            echo "action=unknown" >> $GITHUB_OUTPUT
          fi

      # ── Unknown command ──────────────────────────────────────────
      - name: Unknown command
        if: steps.cmd.outputs.action == 'unknown'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "⚠️ Unknown command. Available commands: `openviper-tool test`, `openviper-tool build`, `openviper-tool quality`, `openviper-tool docs`, `openviper-tool deploy`"
            })

      # ── Quality Checks ───────────────────────────────────────────
      - name: Setup Python (quality)
        if: steps.cmd.outputs.action == 'quality'
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install quality tools
        if: steps.cmd.outputs.action == 'quality'
        run: pip install black ruff flake8 mypy bandit safety

      - name: Check black formatting
        if: steps.cmd.outputs.action == 'quality'
        run: black --check --diff openviper tests

      - name: Ruff
        if: steps.cmd.outputs.action == 'quality'
        run: ruff check openviper

      - name: Flake8
        if: steps.cmd.outputs.action == 'quality'
        run: flake8 openviper

      - name: Install system dependencies (quality)
        if: steps.cmd.outputs.action == 'quality'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libpq-dev unixodbc-dev

      - name: Install OpenViper + dev requirements (quality)
        if: steps.cmd.outputs.action == 'quality'
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: mypy
        if: steps.cmd.outputs.action == 'quality'
        run: mypy openviper/*.py

      - name: Bandit
        if: steps.cmd.outputs.action == 'quality'
        run: bandit -r openviper -q -c pyproject.toml

      - name: Safety
        if: steps.cmd.outputs.action == 'quality'
        run: safety scan || true

      # ── Publish Docs ─────────────────────────────────────────────
      - name: Trigger docs Pages workflow
        if: steps.cmd.outputs.action == 'publish-docs'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'static.yml',
              ref: 'master'
            })

      - name: Confirm docs workflow dispatch
        if: steps.cmd.outputs.action == 'publish-docs'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "Docs deployment workflow dispatched via `static.yml`."
            })

      # ── Test Workflow ────────────────────────────────────────────
      - name: Setup Python (test)
        if: steps.cmd.outputs.action == 'test' || steps.cmd.outputs.action == 'deploy'
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install system dependencies (test)
        if: steps.cmd.outputs.action == 'test' || steps.cmd.outputs.action == 'deploy'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libpq-dev unixodbc-dev

      - name: Install Python dependencies (test)
        if: steps.cmd.outputs.action == 'test' || steps.cmd.outputs.action == 'deploy'
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Run unit tests
        if: steps.cmd.outputs.action == 'test' || steps.cmd.outputs.action == 'deploy'
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY || 'ci-test-secret-key-do-not-use-in-production-must-be-long-enough' }}
        run: pytest tests/unit -v --no-cov

      - name: Setup Node (frontend test)
        if: steps.cmd.outputs.action == 'test' || steps.cmd.outputs.action == 'deploy'
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: admin_frontend/package-lock.json

      - name: Install frontend dependencies
        if: steps.cmd.outputs.action == 'test' || steps.cmd.outputs.action == 'deploy'
        working-directory: admin_frontend
        run: npm install

      - name: Build frontend (test)
        if: steps.cmd.outputs.action == 'test' || steps.cmd.outputs.action == 'deploy'
        working-directory: admin_frontend
        run: npm run build

      - name: Run frontend tests
        if: steps.cmd.outputs.action == 'test' || steps.cmd.outputs.action == 'deploy'
        working-directory: admin_frontend
        run: npm test || echo "No tests defined yet"

      # ── Build Section ────────────────────────────────────────────
      - name: Setup Python
        if: steps.cmd.outputs.action == 'build' || steps.cmd.outputs.action == 'deploy'
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Setup Node
        if: steps.cmd.outputs.action == 'build' || steps.cmd.outputs.action == 'deploy'
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build Admin Frontend
        if: steps.cmd.outputs.action == 'build' || steps.cmd.outputs.action == 'deploy'
        working-directory: admin_frontend
        run: |
          npm install
          npm run build

      - name: Build Wheel
        if: steps.cmd.outputs.action == 'build' || steps.cmd.outputs.action == 'deploy'
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Upload Artifact
        if: steps.cmd.outputs.action == 'build' || steps.cmd.outputs.action == 'deploy'
        uses: actions/upload-artifact@v4
        with:
          name: openviper-build-${{ github.event.issue.number }}
          path: dist/*.whl

      # ── Deploy ───────────────────────────────────────────────────
      - name: Deploy to PyPI
        if: steps.cmd.outputs.action == 'deploy'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install twine
          twine upload dist/* --skip-existing