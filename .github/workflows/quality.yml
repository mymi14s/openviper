# ────────────────────────────────────────────────────────────────────────────
# OpenViper — Code Quality CI/CD Pipeline
# ────────────────────────────────────────────────────────────────────────────
name: Code Quality

on:
  push:
    branches: [master, staging]
  pull_request:
    branches: [master, staging]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Formatting Check ──────────────────────────────────────────────────
  format:
    name: Formatting (black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - run: pip install black
      - name: Check black formatting
        run: black --check --diff openviper tests

  # ── Linting ───────────────────────────────────────────────────────────
  lint:
    name: Linting (ruff + flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - run: pip install ruff flake8
      - name: Ruff
        run: ruff check openviper
      - name: Flake8
        run: flake8 openviper

  # ── Type Checking ─────────────────────────────────────────────────────
  typecheck:
    name: Type Checking (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libpq-dev unixodbc-dev
      - name: Install OpenViper + dev requirements
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[all]'
          pip install -r requirements-dev.txt
      - name: mypy
        run: mypy openviper/*.py

  # ── Tests ─────────────────────────────────────────────────────────────
  test_unit:
    name: Tests Unit (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libpq-dev unixodbc-dev
      - name: Install OpenViper + dev requirements
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[all]'
          pip install -r requirements-dev.txt
      - name: Run tests with coverage
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY || 'ci-test-secret-key-do-not-use-in-production-must-be-long-enough' }}
        run: pytest tests/unit --cov=openviper --cov-report=term-missing --cov-fail-under=0 -v

  test_integration:
    name: Tests Integration (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libpq-dev unixodbc-dev
      - name: Install OpenViper + dev requirements
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[all]'
          pip install -r requirements-dev.txt
      - name: Run tests
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY || 'ci-test-secret-key-do-not-use-in-production-must-be-long-enough' }}
        run: pytest tests/integration -v

  # ── Security ──────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - run: pip install bandit safety
      - name: Bandit
        run: bandit -r openviper -q -c pyproject.toml
      - name: Safety
        run: safety scan || true
