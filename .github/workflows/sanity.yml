name: Sanity

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e ".[dev,docs,ai,redis,postgres,geolocation,tasks]"

      - name: Run pre-commit
        env:
          SKIP: test-unit,test-integration
        run: |
          .venv/bin/pre-commit run --all-files --show-diff-on-failure
          git diff --exit-code

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: pre-commit
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e ".[dev,docs,ai,redis,postgres,geolocation,tasks]"

      - name: Run unit tests
        run: .venv/bin/pytest tests/unit -v

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e ".[dev,docs,ai,redis,postgres,geolocation,tasks]"

      - name: Run integration tests
        run: .venv/bin/pytest tests/integration -v
