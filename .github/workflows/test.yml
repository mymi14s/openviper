name: Test Workflow

on:
  push:
    branches: [ master, staging ]
  pull_request:
    branches: [ master, staging ]
  workflow_dispatch:

jobs:
  unit_tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libpq-dev unixodbc-dev
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt
      - name: Run unit tests
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY || 'ci-test-secret-key-do-not-use-in-production-must-be-long-enough' }}
        run: |
          pytest tests/unit -v --no-cov

  admin_frontend_tests:
    name: Admin Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin_frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: admin_frontend/package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Build frontend
        run: npm run build
      - name: Run tests
        run: npm test || echo "No tests defined yet"
