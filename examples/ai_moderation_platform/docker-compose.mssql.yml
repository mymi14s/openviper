x-common-env: &common-env
  DEBUG: 0
  SECRET_KEY: "dev-only-insecure-key"
  OPENVIPER_SETTINGS_MODULE: "ai_moderation_platform.settings"
  DATABASE_URL: "mssql+aioodbc://sa:YourStrong!Passw0rd@db:1433/moderation?driver=ODBC+Driver+18+for+SQL+Server&TrustServerCertificate=yes"
  REDIS_URL: "redis://redis:6379/0"
  REDIS_BACKEND_URL: "redis://redis:6379/1"
  GEMINI_API_KEY: "dummy-gemini-key"
  STATIC_ROOT: "/app/static"
  MEDIA_ROOT: "/app/media"

services:
  db-init:
    build:
      context: ../../
      dockerfile: examples/ai_moderation_platform/Dockerfile
      args:
        OPENVIPER_EXTRAS: "mssql,tasks-redis,ai"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        python -c "
        import pyodbc, time
        for _ in range(30):
            try:
                c = pyodbc.connect(
                    'DRIVER={ODBC Driver 18 for SQL Server};'
                    'SERVER=db;PORT=1433;UID=sa;PWD=YourStrong!Passw0rd;'
                    'TrustServerCertificate=yes;database=master',
                    timeout=5,
                    autocommit=True,
                )
                break
            except Exception:
                time.sleep(2)
        else:
            raise SystemExit('MSSQL not ready')
        c.cursor().execute(\"IF DB_ID('moderation') IS NULL CREATE DATABASE moderation\")
        c.close()
        print('Database moderation ready')
        "
    depends_on:
      db:
        condition: service_started
    restart: "no"

  web:
    build:
      context: ../../
      dockerfile: examples/ai_moderation_platform/Dockerfile
      args:
        OPENVIPER_EXTRAS: "mssql,tasks-redis,ai"
    environment:
      <<: *common-env
    volumes:
      - .:/app
      - static_data:/app/static
      - media_data:/app/media
      - logs_data:/app/logs
    expose:
      - "8000"
    command: |
      sh -c "
        until python viperctl.py migrate; do
          echo 'migrate failed, retrying in 5s...'; sleep 5;
        done
        python viperctl.py collectstatic --no-input
        python -m uvicorn ai_moderation_platform.asgi:app --host 0.0.0.0 --port 8000 --reload
      "
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  worker:
    build:
      context: ../../
      dockerfile: examples/ai_moderation_platform/Dockerfile
      args:
        OPENVIPER_EXTRAS: "mssql,tasks-redis,ai"
    environment:
      <<: *common-env
    volumes:
      - .:/app
      - logs_data:/app/logs
    command: |
      sh -c "
        python viperctl.py start-worker
      "
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
      web:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - static_data:/usr/share/nginx/staticfiles:ro
      - media_data:/usr/share/nginx/media:ro
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
    depends_on:
      - web
    restart: unless-stopped

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrong!Passw0rd -C -Q 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

configs:
  nginx_conf:
    content: |
      server {
          listen 80;
          server_name _;
          location /static/ {
              alias /usr/share/nginx/staticfiles/;
              expires 1y;
              add_header Cache-Control "public, immutable";
              access_log off;
              gzip on;
              gzip_types text/css application/javascript application/json image/svg+xml;
          }
          location /media/ {
              alias /usr/share/nginx/media/;
              expires 7d;
              add_header Cache-Control "public";
              access_log off;
          }
          location = /admin {
              return 301 /admin/;
          }
          location / {
              proxy_pass http://web:8000;
              proxy_set_header Host              $$host;
              proxy_set_header X-Real-IP         $$remote_addr;
              proxy_set_header X-Forwarded-For   $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_http_version 1.1;
              proxy_set_header Upgrade    $$http_upgrade;
              proxy_set_header Connection "upgrade";
              proxy_read_timeout  300s;
              proxy_send_timeout  300s;
              proxy_connect_timeout 10s;
          }
          location /nginx-health {
              access_log off;
              return 200 "healthy\n";
              add_header Content-Type text/plain;
          }
      }

volumes:
  mssql_data:
  redis_data:
  static_data:
  media_data:
  logs_data:
