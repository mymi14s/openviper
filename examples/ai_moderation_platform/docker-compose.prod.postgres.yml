services:

  # ── Application server ──────────────────────────────────────────────────────
  web:
    build:
      context: .
      target: production
    expose:
      - "8000"
    environment:
      DEBUG: "0"
      SECRET_KEY: "CHANGE_ME_STRONG_SECRET_KEY"
      DATABASE_URL: "postgresql+asyncpg://ai_moderation_platform:ai_moderation_platform@db:5432/ai_moderation_platform"
      OPENVIPER_SETTINGS_MODULE: "ai_moderation_platform.settings"
      REDIS_URL: "redis://redis:6379/0"
      REDIS_BACKEND_URL: "redis://redis:6379/1"
      STATIC_ROOT: "/app/static"
      MEDIA_ROOT: "/app/media"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    restart: unless-stopped
    depends_on:
      - db
      - redis

  # ── Dramatiq worker ─────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      target: production
    command: python viperctl.py runworker
    environment:
      DEBUG: "0"
      SECRET_KEY: "CHANGE_ME_STRONG_SECRET_KEY"
      DATABASE_URL: "postgresql+asyncpg://ai_moderation_platform:ai_moderation_platform@db:5432/ai_moderation_platform"
      OPENVIPER_SETTINGS_MODULE: "ai_moderation_platform.settings"
      REDIS_URL: "redis://redis:6379/0"
      REDIS_BACKEND_URL: "redis://redis:6379/1"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      SKIP_COLLECTSTATIC: "1"
      SKIP_MIGRATIONS: "1"
    restart: unless-stopped
    depends_on:
      - db
      - redis

  # ── Redis (Message Broker) ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  # ── Database (PostgreSQL for production) ────────────────────────────────────
  db:
    image: postgres:16-alpine
    # command: ["postgres", "-c", "log_min_error_statement=panic"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: "ai_moderation_platform"
      POSTGRES_USER: "ai_moderation_platform"
      POSTGRES_PASSWORD: "ai_moderation_platform"
    restart: unless-stopped

  # ── Nginx: static files + reverse proxy ─────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      # Uncomment to enable HTTPS (requires SSL certs in ./nginx/certs/)
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/usr/share/nginx/staticfiles:ro
      - media_volume:/usr/share/nginx/media:ro
      # Uncomment for SSL:
      # - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  postgres_data:
  static_volume:
  media_volume:
