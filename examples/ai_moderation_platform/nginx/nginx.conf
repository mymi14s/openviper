# Production nginx configuration for tp / Openviper
# ─────────────────────────────────────────────────────────────────────────────
# Responsibilities:
#   1. Serve /static/* and /admin/assets/* directly from filesystem
#   2. Serve the admin SPA index.html for all /admin/* routes (client-side routing)
#   3. Reverse-proxy everything else to the uvicorn app

server {
    listen 80;
    server_name _;

    # ── General static files (/static/) ─────────────────────────────────────
    location /static/ {
        alias /usr/share/nginx/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        gzip on;
        gzip_types text/css application/javascript application/json image/svg+xml;
    }

    # ── User-uploaded media files (/media/) ──────────────────────────────────
    location /media/ {
        alias /usr/share/nginx/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Admin: redirect bare /admin to /admin/ ──────────────────────────────
    location = /admin {
        return 301 /admin/;
    }

    # ── Application (API + admin SPA HTML + all other requests) ──────────────
    # The app serves /admin/ and /admin/login etc. via serve_admin_spa.
    # nginx only intercepts /admin/assets/* above (JS/CSS files).
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;
    }

    # ── Health check ─────────────────────────────────────────────────────────
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
