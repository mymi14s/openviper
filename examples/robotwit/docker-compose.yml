# Docker Compose for robotwit

x-common-env: &common-env
  DEBUG: 0
  SECRET_KEY: "dev-only-insecure-key"
  OPENVIPER_SETTINGS_MODULE: "robotwit.settings"
  REDIS_URL: "redis://redis:6379/0"
  REDIS_BACKEND_URL: "redis://redis:6379/1"
  GEMINI_API_KEY: "${GEMINI_API_KEY:-dummy-gemini-key}"
  OLLAMA_BASE_URL: "http://ollama:11434"
  STATIC_ROOT: "/app/static"
  MEDIA_ROOT: "/app/media"
  TASKS_BROKER: "redis"

services:
  web:
    build:
      context: ../../
      dockerfile: examples/robotwit/Dockerfile
      args:
        OPENVIPER_EXTRAS: "postgres,tasks-redis,ai"
    environment:
      <<: *common-env
    volumes:
      - .:/app
      - ../../openviper:/usr/local/lib/python3.14/site-packages/openviper
      - media_data:/app/media
      - logs_data:/app/logs
    expose:
      - "8000"
    command: |
      sh -c "
        python /app/viperctl.py migrate
        python /app/viperctl.py collectstatic --no-input
        python -m uvicorn robotwit.asgi:app --host 0.0.0.0 --port 8000 --workers 8
      "
    depends_on:
      frontend-builder:
        condition: service_completed_successfully
      redis:
        condition: service_started
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend-builder:
    image: node:24-slim
    working_dir: /app/frontend
    volumes:
      - .:/app
    command: sh -c "npm install && npm run build"

  worker:
    build:
      context: ../../
      dockerfile: examples/robotwit/Dockerfile
      args:
        OPENVIPER_EXTRAS: "postgres,tasks-redis,ai"
    environment:
      <<: *common-env
    volumes:
      - .:/app
      - ../../openviper:/usr/local/lib/python3.14/site-packages/openviper
      - logs_data:/app/logs
    command: |
      sh -c "
        python /app/viperctl.py start-worker
      "
    depends_on:
      redis:
        condition: service_started
      web:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./static:/usr/share/nginx/staticfiles:ro
      - media_data:/usr/share/nginx/media:ro
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
    depends_on:
      - web
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: "0.0.0.0"
    volumes:
      - ollama_data:/root/.ollama
    expose:
      - "11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list 2>/dev/null | grep -q 'smollm2:135m' || (ollama pull smollm2:135m 2>&1 && ollama list 2>/dev/null | grep -q 'smollm2:135m')"]
      interval: 30s
      timeout: 120s
      retries: 10
      start_period: 30s
    restart: unless-stopped

configs:
  nginx_conf:
    content: |
      server {
          listen 80;
          server_name _;
          location /static/ {
              alias /usr/share/nginx/staticfiles/;
              expires 1y;
              add_header Cache-Control "public, immutable";
              access_log off;
              gzip on;
              gzip_types text/css application/javascript application/json image/svg+xml;
          }
          location /media/ {
              alias /usr/share/nginx/media/;
              expires 7d;
              add_header Cache-Control "public";
              access_log off;
          }
          location = /admin {
              return 301 /admin/;
          }
          location / {
              proxy_pass http://web:8000;
              proxy_set_header Host              $$host;
              proxy_set_header X-Real-IP         $$remote_addr;
              proxy_set_header X-Forwarded-For   $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_http_version 1.1;
              proxy_set_header Upgrade    $$http_upgrade;
              proxy_set_header Connection "upgrade";
              proxy_read_timeout  300s;
              proxy_send_timeout  300s;
              proxy_connect_timeout 10s;
          }
          location /nginx-health {
              access_log off;
              return 200 "healthy\n";
              add_header Content-Type text/plain;
          }
      }

volumes:
  redis_data:
  ollama_data:
  media_data:
  logs_data: