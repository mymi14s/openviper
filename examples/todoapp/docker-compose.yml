# Docker Compose for todoapp
# ─────────────────────────────────────────────────────────────────────────────
# Usage: docker compose up
#
# Brings up:
#   - web      (OpenViper ASGI server - runs migrations first)
#   - db       (MariaDB database)
#   - nginx    (reverse proxy on port 8080)

x-common-env: &common-env
  DEBUG: 0
  SECRET_KEY: "dev-only-insecure-key"
  OPENVIPER_SETTINGS_MODULE: "settings"
  DATABASE_URL: "mariadb+aiomysql://todoapp:todoapp@db:3306/todoapp"

services:
  web:
    build:
      context: ../../
      dockerfile: examples/todoapp/Dockerfile
      args:
        OPENVIPER_EXTRAS: "mariadb"
    environment:
      <<: *common-env
    volumes:
      - .:/app
      - static_data:/app/static
      - logs_data:/app/logs
    expose:
      - "8000"
    command: |
      sh -c "
        until openviper viperctl migrate .; do
          echo 'migrate failed, retrying in 5s...'; sleep 5;
        done
        openviper viperctl collectstatic . --no-input
        openviper run app --host 0.0.0.0 --port 8000 --no-reload
      "
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - static_data:/usr/share/nginx/staticfiles:ro
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
    depends_on:
      - web
    restart: unless-stopped

  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: todoapp
      MARIADB_USER: todoapp
      MARIADB_PASSWORD: todoapp
      MARIADB_ROOT_PASSWORD: rootpass
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u todoapp -ptodoapp todoapp || mariadb-admin ping -h localhost -u root -prootpass"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    restart: unless-stopped

configs:
  nginx_conf:
    content: |
      server {
          listen 80;
          server_name _;
          location /static/ {
              alias /usr/share/nginx/staticfiles/;
              expires 1y;
              add_header Cache-Control "public, immutable";
              access_log off;
              gzip on;
              gzip_types text/css application/javascript application/json image/svg+xml;
          }
          location = /admin {
              return 301 /admin/;
          }
          location / {
              proxy_pass http://web:8000;
              proxy_set_header Host              $$host;
              proxy_set_header X-Real-IP         $$remote_addr;
              proxy_set_header X-Forwarded-For   $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_http_version 1.1;
              proxy_set_header Upgrade    $$http_upgrade;
              proxy_set_header Connection "upgrade";
              proxy_read_timeout  300s;
              proxy_send_timeout  300s;
              proxy_connect_timeout 10s;
          }
          location /nginx-health {
              access_log off;
              return 200 "healthy\n";
              add_header Content-Type text/plain;
          }
      }

volumes:
  mariadb_data:
  static_data:
  logs_data:
