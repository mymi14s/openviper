<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Todos{% endblock %} — OpenViper</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── Nav ─────────────────────────────────────────── */
    nav {
      background: #1a1a2e;
      color: #fff;
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    nav .brand { font-weight: 700; font-size: 1rem; letter-spacing: .02em; }
    nav .brand span { color: #4f9cf9; }
    nav .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: .875rem;
      color: #a0aec0;
    }

    /* ── Layout ──────────────────────────────────────── */
    .page { max-width: 560px; margin: 48px auto; padding: 0 16px; }

    /* ── Card ────────────────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 10px;
      padding: 28px 32px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.04);
    }
    .card-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 24px;
      color: #1a1a2e;
    }

    /* ── Forms ───────────────────────────────────────── */
    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #718096;
      margin-bottom: 6px;
    }
    input[type=text],
    input[type=password] {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid #e2e8f0;
      border-radius: 6px;
      font-size: .95rem;
      color: #1a1a2e;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus {
      outline: none;
      border-color: #4f9cf9;
      box-shadow: 0 0 0 3px rgba(79,156,249,.18);
    }

    /* ── Buttons ─────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 9px 20px;
      border: none;
      border-radius: 6px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background .15s, opacity .15s;
      white-space: nowrap;
    }
    .btn-primary { background: #4f9cf9; color: #fff; }
    .btn-primary:hover { background: #3a89e8; }
    .btn-ghost {
      background: transparent;
      color: #a0aec0;
      font-weight: 500;
      padding: 6px 10px;
    }
    .btn-ghost:hover { color: #fff; }
    .btn-icon {
      background: transparent;
      color: #cbd5e0;
      border: none;
      padding: 4px 6px;
      cursor: pointer;
      border-radius: 4px;
      font-size: .95rem;
      line-height: 1;
      transition: color .12s, background .12s;
    }
    .btn-icon:hover { color: #fc5252; background: #fff0f0; }

    /* ── Alert ───────────────────────────────────────── */
    .alert {
      padding: 10px 14px;
      border-radius: 6px;
      font-size: .875rem;
      margin-bottom: 18px;
    }
    .alert-error { background: #fff5f5; color: #c53030; border: 1px solid #fed7d7; }

    /* ── Todo list ───────────────────────────────────── */
    .add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    .add-row input { flex: 1; }

    .todo-list { list-style: none; }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid #f7fafc;
    }
    .todo-item:last-child { border-bottom: none; }

    /* custom checkbox */
    .todo-item input[type=checkbox] {
      appearance: none;
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border: 2px solid #cbd5e0;
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .12s, border-color .12s;
    }
    .todo-item input[type=checkbox]:checked {
      background: #4f9cf9;
      border-color: #4f9cf9;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 10 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 4l3 3 5-6' stroke='white' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: center;
    }

    .todo-title {
      flex: 1;
      font-size: .95rem;
      line-height: 1.4;
    }
    .todo-title.done {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      font-size: .9rem;
      padding: 32px 0;
    }

    /* ── Stats bar ───────────────────────────────────── */
    .stats {
      display: flex;
      justify-content: space-between;
      font-size: .8rem;
      color: #a0aec0;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f0f2f5;
    }
  </style>
</head>
<body>

{% block nav %}{% endblock %}

<div class="page">
  {% block content %}{% endblock %}
</div>

</body>
</html>
