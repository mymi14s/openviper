# Production Docker Compose
# ─────────────────────────────────────────────────────────────────────────────
# Usage:  docker compose -f docker-compose.prod.yml up -d
#
# Architecture:
#   ┌─────────┐     ┌──────────────────────────────┐
#   │  nginx  │────▶│  /static/*  → staticfiles/   │
#   │ :80/:443│     │  /* proxy  → web:8000         │
#   └─────────┘     └──────────────────────────────┘
#
# - DEBUG=False: framework does NOT serve static files
# - nginx serves /static/* and /media/* directly from shared volumes
# - The app (uvicorn) handles all API/page requests only
# - Admin frontend must be pre-built (npm run build) into static/

services:

  # ── Application server ──────────────────────────────────────────────────────
  web:
    build:
      context: .
      target: production
    expose:
      - "8000"
    environment:
      DEBUG: "0"
      SECRET_KEY: "CHANGE_ME_STRONG_SECRET_KEY"
      DATABASE_URL: "mysql+aiomysql://tp:changeme@db:3306/tp"
      OPENVIPER_SETTINGS_MODULE: "tp.settings"
      STATIC_ROOT: "/app/static"
      MEDIA_ROOT: "/app/media"
    volumes:
      # Share collected static files with nginx
      - static_volume:/app/static
      # Share uploaded media files with nginx
      - media_volume:/app/media
    restart: unless-stopped
    depends_on:
      - db

  # ── Database (MariaDB for production) ───────────────────────────────────────
  db:
    image: mariadb:10.11
    volumes:
      - mariadb_data:/var/lib/mysql
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-tp}
      MARIADB_USER: ${MARIADB_USER:-tp}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-changeme}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-rootsecret}
      # Allow connections from any host (other docker containers)
      MARIADB_ROOT_HOST: "%"
    restart: unless-stopped

  # ── Nginx: static files + reverse proxy ─────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      # Uncomment to enable HTTPS (requires SSL certs in ./nginx/certs/)
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/usr/share/nginx/staticfiles:ro
      - media_volume:/usr/share/nginx/media:ro
      # Uncomment for SSL:
      # - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  mariadb_data:
  static_volume:
  media_volume:
