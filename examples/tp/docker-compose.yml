# Docker Compose for tp
# ─────────────────────────────────────────────────────────────────────────────
# Usage: docker compose up
#
# Brings up:
#   - web      (OpenViper ASGI server - runs migrations first)
#   - db       (PostgreSQL database)
#   - nginx    (reverse proxy on port 8080)

x-common-env: &common-env
  DEBUG: 0
  SECRET_KEY: "dev-only-insecure-key"
  OPENVIPER_SETTINGS_MODULE: "tp.settings"
  DATABASE_URL: "postgresql+asyncpg://tp:tp@db:5432/tp"

services:
  web:
    build:
      context: ../../
      dockerfile: examples/tp/Dockerfile
      args:
        OPENVIPER_EXTRAS: "postgres"
    environment:
      <<: *common-env
    volumes:
      - .:/app
      - static_data:/app/static
      - media_data:/app/media
      - logs_data:/app/logs
    expose:
      - "8000"
    command: |
      sh -c "
        until python viperctl.py migrate; do
          echo 'migrate failed, retrying in 5s...'; sleep 5;
        done
        python viperctl.py collectstatic --no-input
        python -m uvicorn tp.asgi:app --host 0.0.0.0 --port 8000
      "
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - static_data:/usr/share/nginx/staticfiles:ro
      - media_data:/usr/share/nginx/media:ro
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
    depends_on:
      - web
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: tp
      POSTGRES_USER: tp
      POSTGRES_PASSWORD: tp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tp -d tp"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 5s
    restart: unless-stopped

configs:
  nginx_conf:
    content: |
      server {
          listen 80;
          server_name _;
          location /static/ {
              alias /usr/share/nginx/staticfiles/;
              expires 1y;
              add_header Cache-Control "public, immutable";
              access_log off;
              gzip on;
              gzip_types text/css application/javascript application/json image/svg+xml;
          }
          location /media/ {
              alias /usr/share/nginx/media/;
              expires 7d;
              add_header Cache-Control "public";
              access_log off;
          }
          location = /admin {
              return 301 /admin/;
          }
          location / {
              proxy_pass http://web:8000;
              proxy_set_header Host              $$host;
              proxy_set_header X-Real-IP         $$remote_addr;
              proxy_set_header X-Forwarded-For   $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_http_version 1.1;
              proxy_set_header Upgrade    $$http_upgrade;
              proxy_set_header Connection "upgrade";
              proxy_read_timeout  300s;
              proxy_send_timeout  300s;
              proxy_connect_timeout 10s;
          }
          location /nginx-health {
              access_log off;
              return 200 "healthy\n";
              add_header Content-Type text/plain;
          }
      }

volumes:
  postgres_data:
  static_data:
  media_data:
  logs_data:
